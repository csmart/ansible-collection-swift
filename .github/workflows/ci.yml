---
name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "ansible-core>=2.16,<2.17" yamllint ansible-lint

      - name: YAML lint
        run: yamllint -s .

      - name: Ansible lint
        run: ansible-lint

  syntax:
    name: Ansible syntax check
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        ansible-core:
          - "2.16"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible ${{ matrix.ansible-core }}
        run: pip install "ansible-core~=${{ matrix.ansible-core }}.0" netaddr

      - name: Install collection dependencies
        run: >-
          ansible-galaxy collection install
          ansible.posix
          ansible.utils
          "community.general:<12.0.0"
          "community.crypto:<3.0.0"

      - name: Build and install collection
        run: |
          ansible-galaxy collection build --force
          ansible-galaxy collection install csmart-swift-*.tar.gz --force

      - name: Syntax check
        run: ansible-playbook --syntax-check playbooks/site.yml -i playbooks/inventory/swift.yml

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "ansible-core>=2.16,<2.17" molecule molecule-podman netaddr yamllint ansible-lint

      - name: Install collection dependencies
        run: >-
          ansible-galaxy collection install
          ansible.posix
          ansible.utils
          "community.general:<12.0.0"
          "community.crypto:<3.0.0"

      - name: Build and install collection
        run: |
          ansible-galaxy collection build --force
          ansible-galaxy collection install csmart-swift-*.tar.gz --force

      - name: Run Molecule
        run: molecule test
